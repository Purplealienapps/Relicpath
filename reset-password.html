<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password | RelicPath</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121512;
      color: #f4efe3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    .card {
      width: 100%;
      max-width: 460px;
      background: #1d221d;
      border-radius: 26px;
      padding: 28px;
      box-sizing: border-box;
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
    }

    h1 {
      color: #c49a3a;
      margin: 0 0 8px;
      font-size: 32px;
    }

    p {
      color: #b9ad92;
      line-height: 1.5;
      font-size: 15px;
    }

    label {
      display: block;
      margin-top: 18px;
      margin-bottom: 6px;
      color: #f4efe3;
      font-weight: bold;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      border-radius: 14px;
      border: 1px solid #b9ad92;
      background: #121512;
      color: #f4efe3;
      font-size: 16px;
    }

    button {
      width: 100%;
      margin-top: 20px;
      padding: 15px;
      border: none;
      border-radius: 18px;
      background: #c49a3a;
      color: #121512;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 18px;
      padding: 14px;
      border-radius: 14px;
      background: #121512;
      color: #f4efe3;
      font-size: 14px;
      line-height: 1.4;
      white-space: pre-line;
    }

    .error {
      background: #8b1e1e;
    }

    .success {
      background: #2e7d32;
    }
  </style>
</head>

<body>
  <div class="card">
    <h1>Reset Password</h1>

    <p>
      Enter a new password for your RelicPath account. After saving it, return to the RelicPath app and sign in with your new password.
    </p>

    <label for="newPassword">New Password</label>
    <input id="newPassword" type="password" placeholder="At least 6 characters" />

    <label for="confirmPassword">Confirm Password</label>
    <input id="confirmPassword" type="password" placeholder="Re-enter password" />

    <button id="resetButton" disabled>SAVE NEW PASSWORD</button>

    <div id="message" class="message">
      Loading password reset session...
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    const SUPABASE_URL = "https://rpmhmtxftbptidmgnmzi.supabase.co"
    const SUPABASE_ANON_KEY = "sb_publishable_ni_H-Tlt07YOw1bIGN_1zw_vgvgaDq2"


    const supabaseClient = supabase.createClient(
      SUPABASE_URL,
      SUPABASE_ANON_KEY,
      {
        auth: {
          detectSessionInUrl: true,
          persistSession: true,
          autoRefreshToken: true
        }
      }
    );

    const messageBox = document.getElementById("message");
    const resetButton = document.getElementById("resetButton");
    const newPasswordInput = document.getElementById("newPassword");
    const confirmPasswordInput = document.getElementById("confirmPassword");

    let resetSessionReady = false;

    function showMessage(text, type) {
      messageBox.textContent = text;
      messageBox.className = "message";

      if (type === "error") {
        messageBox.classList.add("error");
      }

      if (type === "success") {
        messageBox.classList.add("success");
      }
    }

    async function establishResetSession() {
      try {
        const url = new URL(window.location.href);
        const code = url.searchParams.get("code");

        if (code) {
          const result = await supabaseClient.auth.exchangeCodeForSession(code);

          if (result.error) {
            showMessage(result.error.message, "error");
            resetButton.disabled = true;
            return;
          }
        }

        const hashParams = new URLSearchParams(
          window.location.hash.replace("#", "")
        );

        const accessToken = hashParams.get("access_token");
        const refreshToken = hashParams.get("refresh_token");

        if (accessToken && refreshToken) {
          const result = await supabaseClient.auth.setSession({
            access_token: accessToken,
            refresh_token: refreshToken
          });

          if (result.error) {
            showMessage(result.error.message, "error");
            resetButton.disabled = true;
            return;
          }
        }

        const sessionResult = await supabaseClient.auth.getSession();

        if (sessionResult.error) {
          showMessage(sessionResult.error.message, "error");
          resetButton.disabled = true;
          return;
        }

        if (sessionResult.data.session) {
          resetSessionReady = true;
          resetButton.disabled = false;
          showMessage("Reset link verified. Enter your new password.", "success");
          return;
        }

        showMessage(
          "No password reset session was found. Open this page by clicking the newest password reset link from your email.",
          "error"
        );
        resetButton.disabled = true;

      } catch (error) {
        showMessage(
          error.message || "Could not verify password reset session.",
          "error"
        );
        resetButton.disabled = true;
      }
    }

    resetButton.addEventListener("click", async () => {
      const newPassword = newPasswordInput.value.trim();
      const confirmPassword = confirmPasswordInput.value.trim();

      if (!resetSessionReady) {
        showMessage(
          "Password reset session is missing. Open the newest reset link from your email and try again.",
          "error"
        );
        return;
      }

      if (newPassword.length < 6) {
        showMessage("Password must be at least 6 characters.", "error");
        return;
      }

      if (newPassword !== confirmPassword) {
        showMessage("Passwords do not match.", "error");
        return;
      }

      resetButton.disabled = true;
      showMessage("Saving new password...", "");

      const result = await supabaseClient.auth.updateUser({
        password: newPassword
      });

      if (result.error) {
        showMessage(result.error.message, "error");
        resetButton.disabled = false;
      } else {
        showMessage(
          "Password updated successfully. Return to the RelicPath app and sign in with your new password.",
          "success"
        );

        newPasswordInput.value = "";
        confirmPasswordInput.value = "";

        try {
          await supabaseClient.auth.signOut();
        } catch (error) {
          // Do nothing. Password already updated.
        }
      }
    });

    establishResetSession();
  </script>
</body>
</html>
</html>
